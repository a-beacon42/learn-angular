<section>
  <h2>{{ moduleTitle }}</h2>

  <label>
    Search
    <input [value]="query()" (input)="query.set($any($event.target).value)" />
  </label>

  <ul>
    @for (item of filteredItems(); track item.id) {
      <!-- BUG: track by index destabilizes identity when ordering changes. -->
      <li>
        <button type="button" (click)="toggleExpanded(item.id)">
          {{ isExpanded(item.id) ? "Hide" : "Show" }} details
        </button>

        @if (isExpanded(item.id)) {
          <span>{{ item.label }} ({{ item.tag }})</span>
        }

        <button type="button" (click)="toggleDone(item.id)">
          {{ item.done ? "Undo" : "Complete" }}
        </button>
      </li>
    }
  </ul>
</section>
